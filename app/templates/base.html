<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Taste Graph{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/app.css?v={{ request.app.state.asset_version }}">
    {% block head %}{% endblock %}
  </head>
  <body>
    <header class="topbar">
      <a class="brand-lockup" href="/">
        <strong>Taste Graph</strong>
        <span>Explore by vibe, not genre.</span>
      </a>
      <nav>
        <a href="/graph" class="{% if request.url.path == '/graph' %}active{% endif %}">Graph</a>
        <a href="/library" class="{% if request.url.path == '/library' %}active{% endif %}">Library</a>
        <a href="/about" class="{% if request.url.path == '/about' %}active{% endif %}">About</a>
        <a href="http://100.121.121.55:8000/" target="_blank" rel="noreferrer">Plex Assistant</a>
      </nav>
    </header>
    <main class="{% block main_class %}{% endblock %}">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
