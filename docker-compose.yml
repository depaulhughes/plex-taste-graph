services:
  taste-graph:
    build: .
    container_name: taste-graph
    ports:
      - "${APP_PORT:-8001}:8000"
    env_file:
      - .env
    environment:
      TASTE_GRAPH_DB_PATH: ${TASTE_GRAPH_DB_PATH:-/app/data/taste_graph.db}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
