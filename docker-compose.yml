services:
  taste-graph:
    build: .
    container_name: taste-graph
    ports:
      - "32403:8000"
    env_file:
      - .env
    environment:
      TASTE_GRAPH_DB_PATH: ${TASTE_GRAPH_DB_PATH:-/app/data/taste_graph.sqlite}
    volumes:
      - /volume1/docker/taste-graph/data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "scripts/health_check.py"]
      interval: 30s
      timeout: 10s
      retries: 3
